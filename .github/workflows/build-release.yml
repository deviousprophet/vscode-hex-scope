name: Build and Release VSIX

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check-types

      - name: Compile tests
        run: npm run compile-tests

      - name: Compile extension
        run: npm run compile

      - name: Run tests
        run: xvfb-run -a npm test

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Package VSIX
        run: vsce package --out vscode-hex-scope-${{ steps.version.outputs.version }}.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-hex-scope-${{ steps.version.outputs.version }}
          path: vscode-hex-scope-${{ steps.version.outputs.version }}.vsix

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: vscode-hex-scope-${{ steps.version.outputs.version }}.vsix
          generate_release_notes: true
