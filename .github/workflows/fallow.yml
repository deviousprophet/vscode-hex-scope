name: Fallow Analysis

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  Fallow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Fallow Analysis
        uses: fallow-rs/fallow@v2
        with:
          format: sarif
          config: .fallowrc.json
