name: Fallow Analysis

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  Fallow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Build generated analysis inputs
        run: |
          npm ci
          npm run compile-tests

      - name: Run Fallow Analysis
        uses: fallow-rs/fallow@v3
        with:
          format: sarif
