name: CT Workflow

env:
  NODE_VERSION: '24'

on:
  workflow_call:

jobs:
  Test:
    name: Test Execution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Get Branch Head SHA
        id: branch-sha
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Compile Tests
        run: npm run compile-tests

      - name: Compile Extension
        run: npm run compile

      - name: Run Tests
        id: run-tests
        run: |
          set -o pipefail
          xvfb-run -a npm test 2>&1 | tee test-output.log

      - name: Parse Test Results
        id: parse-tests
        if: always()
        run: |
          if [ -f test-output.log ]; then
            PASS=$(grep -Eo '([0-9]+) passing' test-output.log | head -n1 | grep -Eo '[0-9]+' || true)
            FAIL=$(grep -Eo '([0-9]+) failing' test-output.log | head -n1 | grep -Eo '[0-9]+' || true)
          else
            PASS=0
            FAIL=0
          fi
          PASS=${PASS:-0}
          FAIL=${FAIL:-0}
          TOTAL=$((PASS + FAIL))
          if [ "$TOTAL" -gt 0 ]; then
            PASS_RATE=$(( PASS * 100 / TOTAL ))
          else
            PASS_RATE=0
          fi
          echo "passed=$PASS" >> $GITHUB_OUTPUT
          echo "failed=$FAIL" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "pass_rate=$PASS_RATE" >> $GITHUB_OUTPUT

      - name: Prepare Test Results
        if: always() && github.event_name == 'pull_request'
        env:
          PASS: ${{ steps.parse-tests.outputs.passed }}
          FAIL: ${{ steps.parse-tests.outputs.failed }}
          TOTAL: ${{ steps.parse-tests.outputs.total }}
          PASS_RATE: ${{ steps.parse-tests.outputs.pass_rate }}
          RUN_TESTS_OUTCOME: ${{ steps.run-tests.outcome }}
          COMMIT_SHA: ${{ steps.branch-sha.outputs.sha }}
        run: |
          PASS=${PASS:-0}
          FAIL=${FAIL:-0}
          TOTAL=${TOTAL:-0}
          PASS_RATE=${PASS_RATE:-0}
          RUN_TESTS_OUTCOME=${RUN_TESTS_OUTCOME:-unknown}

          echo "## Automated test results" >> $GITHUB_STEP_SUMMARY

          if [ "$RUN_TESTS_OUTCOME" != "success" ] || [ "$TOTAL" -eq 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Status:** ❌ Tests were not executed successfully" >> $GITHUB_STEP_SUMMARY
          elif [ "$FAIL" -eq 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Status:** ✅ All tests passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Status:** ❌ Some tests failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Passed | Failed | Total | Pass rate |" >> $GITHUB_STEP_SUMMARY
          echo "|---:|---:|---:|---:|" >> $GITHUB_STEP_SUMMARY
          echo "| $PASS | $FAIL | $TOTAL | $PASS_RATE% |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "_${GITHUB_SERVER_URL:-https://github.com}/${GITHUB_REPOSITORY}/commit/${COMMIT_SHA}_" >> $GITHUB_STEP_SUMMARY