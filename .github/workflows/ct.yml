name: CT Workflow

env:
  NODE_VERSION: '24'

on:
  workflow_call:

jobs:
  UT_Test:
    name: Unit Test Execution
    runs-on: ubuntu-latest
    outputs:
      run-tests-outcome: ${{ steps.run-tests.outcome }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Compile Tests
        run: npm run compile-tests

      - name: Compile Extension
        run: npm run compile

      - name: Run Tests
        id: run-tests
        run: |
          set -o pipefail
          xvfb-run -a npm test 2>&1 | tee test-output.log

      - name: Upload Test Results Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          path: test-output.log
          name: ut-test-output-${{ github.sha }}
          overwrite: true

  Additional_Profiles:
    name: Additional Resource Profiles
    runs-on: ubuntu-latest
    outputs:
      large-file-outcome: ${{ steps.large-file-profile.outcome }}
      memory-release-outcome: ${{ steps.memory-release-profile.outcome }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Large-File Profile
        id: large-file-profile
        run: |
          set -o pipefail
          npm run profile:large-files 2>&1 | tee large-file-profile-output.log

      - name: Run Memory-Release Profile
        id: memory-release-profile
        if: always()
        run: |
          set -o pipefail
          npm run profile:memory-release 2>&1 | tee memory-release-profile-output.log

      - name: Upload Profile Results Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          path: |
            large-file-profile-output.log
            memory-release-profile-output.log
          name: profile-output-${{ github.sha }}
          overwrite: true

  Finalize:
    name: Finalize Workflow
    needs: [UT_Test, Additional_Profiles]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check Job Results
        run: |
          UT_RESULT="${{ needs.UT_Test.result }}"
          PROFILE_RESULT="${{ needs.Additional_Profiles.result }}"
          FAILED=false
          if [[ "$UT_RESULT" != "success" ]]; then
            echo "❌ Unit Test job: $UT_RESULT"
            FAILED=true
          else
            echo "✅ Unit Test job: $UT_RESULT"
          fi
          if [[ "$PROFILE_RESULT" != "success" ]]; then
            echo "❌ Additional Profiles job: $PROFILE_RESULT"
            FAILED=true
          else
            echo "✅ Additional Profiles job: $PROFILE_RESULT"
          fi
          if [[ "$FAILED" == "true" ]]; then
            exit 1
          fi

      - name: Download UT Test Log
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: ut-test-output-${{ github.sha }}
          path: .

      - name: Download Profile Logs
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: profile-output-${{ github.sha }}
          path: .

      - name: Unit Test Summary
        if: always()
        env:
          RUN_TESTS_OUTCOME: ${{ needs.UT_Test.outputs.run-tests-outcome }}
          LOG_FILE: test-output.log
          SUITE_NAME: Unit Test Results
          TEST_FORMAT: mocha
        run: node .github/scripts/summarize-tests.mjs

      - name: Large-File Profile Summary
        if: always()
        env:
          RUN_TESTS_OUTCOME: ${{ needs.Additional_Profiles.outputs.large-file-outcome }}
          LOG_FILE: large-file-profile-output.log
          SUITE_NAME: Large-File Profile Results
          TEST_FORMAT: large-file-profile
        run: node .github/scripts/summarize-tests.mjs

      - name: Memory-Release Profile Summary
        if: always()
        env:
          RUN_TESTS_OUTCOME: ${{ needs.Additional_Profiles.outputs.memory-release-outcome }}
          LOG_FILE: memory-release-profile-output.log
          SUITE_NAME: Memory-Release Profile Results
          TEST_FORMAT: memory-release-profile
        run: node .github/scripts/summarize-tests.mjs

      - name: Upload Combined Test Results Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          path: |
            test-output.log
            large-file-profile-output.log
            memory-release-profile-output.log
          name: test-results-${{ github.sha }}
          overwrite: true
