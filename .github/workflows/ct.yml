name: CT Workflow

env:
  NODE_VERSION: '24'

on:
  workflow_call:

jobs:
  Test:
    name: Test Execution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Compile Tests
        run: npm run compile-tests

      - name: Compile Extension
        run: npm run compile

      - name: Run Tests
        id: run-tests
        run: |
          set -o pipefail
          xvfb-run -a npm test 2>&1 | tee test-output.log

      - name: Parse Test Results
        id: parse-tests
        if: always()
        run: |
          if [ -f test-output.log ]; then
            PASS=$(grep -Eo '([0-9]+) passing' test-output.log | head -n1 | grep -Eo '[0-9]+' || true)
            FAIL=$(grep -Eo '([0-9]+) failing' test-output.log | head -n1 | grep -Eo '[0-9]+' || true)
          else
            PASS=0
            FAIL=0
          fi
          PASS=${PASS:-0}
          FAIL=${FAIL:-0}
          TOTAL=$((PASS + FAIL))
          if [ "$TOTAL" -gt 0 ]; then
            PASS_RATE=$(( PASS * 100 / TOTAL ))
          else
            PASS_RATE=0
          fi
          echo "passed=$PASS" >> $GITHUB_OUTPUT
          echo "failed=$FAIL" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "pass_rate=$PASS_RATE" >> $GITHUB_OUTPUT

      - name: Prepare Test Results Comment
        id: prepare-test-comment
        if: always()
        env:
          PASS: ${{ steps.parse-tests.outputs.passed }}
          FAIL: ${{ steps.parse-tests.outputs.failed }}
          TOTAL: ${{ steps.parse-tests.outputs.total }}
          PASS_RATE: ${{ steps.parse-tests.outputs.pass_rate }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          PASS=${PASS:-0}
          FAIL=${FAIL:-0}
          TOTAL=${TOTAL:-0}
          PASS_RATE=${PASS_RATE:-0}

          echo "<!-- auto-tests -->" > pr-comment.md
          echo "## Automated test results" >> pr-comment.md
          if [ -z "$FAIL" ] || [ "$FAIL" -eq 0 ]; then
            echo "" >> pr-comment.md
            echo "**Status:** ✅ All tests passed" >> pr-comment.md
            COMMENT_STATUS=success
          else
            echo "" >> pr-comment.md
            echo "**Status:** ❌ Some tests failed" >> pr-comment.md
            COMMENT_STATUS=failure
          fi
          echo "" >> pr-comment.md
          echo "| Passed | Failed | Total | Pass rate |" >> pr-comment.md
          echo "|---:|---:|---:|---:|" >> pr-comment.md
          echo "| $PASS | $FAIL | $TOTAL | $PASS_RATE% |" >> pr-comment.md
          echo "" >> pr-comment.md
          echo "Commit: $GITHUB_SHA" >> pr-comment.md

          echo "comment-status=$COMMENT_STATUS" >> $GITHUB_OUTPUT

      - name: Update Test Results on PR
        if: always()
        uses: mshick/add-pr-comment@v3
        with:
          message-id: auto-tests
          message-path: pr-comment.md
          attach-path: test-output.log
          attach-name: full-test-output
          status: ${{ steps.prepare-test-comment.outputs.comment-status }}
