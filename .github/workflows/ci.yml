name: CI Workflow

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  Performance:
    name: Large-file memory budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:performance

  CT_After_Commit:
    name: Test After Commit
    uses: ./.github/workflows/ct.yml
    permissions:
      contents: read
      pull-requests: write

  Package:
    name: Package VSIX
    needs: [CT_After_Commit, Performance]
    if: ${{ needs.CT_After_Commit.result == 'success' && needs.Performance.result == 'success' }}
    uses: ./.github/workflows/package.yml
    permissions:
      contents: read
