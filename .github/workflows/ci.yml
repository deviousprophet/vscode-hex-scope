name: CI Workflow

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  Fallow_Analysis:
    name: Fallow Analysis
    uses: ./.github/workflows/fallow.yml
    permissions:
      contents: read

  CT_After_Commit:
    name: Test After Commit
    uses: ./.github/workflows/ct.yml
    permissions:
      contents: read
      pull-requests: write

  Package:
    name: Package VSIX
    needs: CT_After_Commit
    if: ${{ needs.CT_After_Commit.result == 'success' }}
    uses: ./.github/workflows/package.yml
    permissions:
      contents: read
