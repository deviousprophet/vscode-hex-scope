name: Publish Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Test:
    name: Test Before Release
    uses: ./.github/workflows/ct.yml
    permissions:
      contents: read

  Package:
    name: Package VSIX
    needs: Test
    if: ${{ needs.Test.result == 'success' }}
    uses: ./.github/workflows/package.yml
    with:
      use_package_version: true
    permissions:
      contents: read

  Release:
    name: Publish Release
    needs: Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download VSIX Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.Package.outputs.vsix_name }}
          path: .

      - name: Build Release Notes
        id: release-notes
        run: node .github/scripts/extract-release-notes.mjs

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ needs.Package.outputs.vsix_name }}.vsix
          body_path: ${{ steps.release-notes.outputs.path }}

      - name: Publish to Open VSX
        uses: HaaLeo/publish-vscode-extension@v2
        with:
          pat: ${{ secrets.OPEN_VSX_TOKEN }}
          extensionFile: ${{ needs.Package.outputs.vsix_name }}.vsix
