name: Publish Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        type: choice
        default: bugfix
        options:
          - bugfix
          - minor
          - major
      release_mode:
        description: 'Release mode'
        required: true
        type: choice
        default: draft
        options:
          - draft
          - official

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name }}-${{ github.ref }}-${{ inputs.release_type || '' }}
  cancel-in-progress: true

jobs:
  Preflight:
    name: Validate Release Inputs
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      release_sha: ${{ steps.release.outputs.release_sha }}
      release_mode: ${{ steps.release.outputs.release_mode }}
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Validate Version and Notes
        id: release
        run: |
          set -euo pipefail

          CURRENT_VERSION="$(node -p "require('./package.json').version")"
          VERSION="$(node .github/scripts/next-release-version.mjs "$CURRENT_VERSION" "${{ inputs.release_type }}")"
          TAG="v${VERSION}"
          RELEASE_MODE="${{ inputs.release_mode }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "::error::Release tag ${TAG} already exists."
            exit 1
          fi

          npm version --no-git-tag-version "$VERSION"
          node .github/scripts/prepare-release.mjs "$VERSION"
          if ! git diff --quiet -- package.json package-lock.json CHANGELOG.md; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add package.json package-lock.json CHANGELOG.md
            git commit -m "release: prepare ${VERSION}" -m "[skip ci] Auto-generated by Release workflow."
            git push origin "HEAD:${GITHUB_REF#refs/heads/}"
          fi

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release version must be semver without a leading v; got ${VERSION}"
            exit 1
          fi

          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "$VERSION" != "$PACKAGE_VERSION" ]; then
            echo "::error::Release version ${VERSION} does not match package.json version ${PACKAGE_VERSION}"
            exit 1
          fi

          node .github/scripts/extract-release-notes.mjs "$VERSION" >/tmp/release-notes.md
          RELEASE_SHA="$(git rev-parse HEAD)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "release_sha=$RELEASE_SHA" >> "$GITHUB_OUTPUT"
          echo "release_mode=$RELEASE_MODE" >> "$GITHUB_OUTPUT"

  Test:
    name: Test Before Release
    needs: Preflight
    uses: ./.github/workflows/ct.yml
    with:
      checkout_ref: ${{ needs.Preflight.outputs.release_sha }}
    permissions:
      contents: read

  Package:
    name: Package VSIX
    needs: Test
    if: ${{ needs.Test.result == 'success' }}
    uses: ./.github/workflows/package.yml
    with:
      use_package_version: true
      checkout_ref: ${{ needs.Preflight.outputs.release_sha }}
    permissions:
      contents: read

  Release:
    name: Publish Release
    needs:
      - Preflight
      - Package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.Preflight.outputs.release_sha }}

      - name: Create Release Tag
        run: |
          set -euo pipefail
          TAG="${{ needs.Preflight.outputs.tag }}"
          git tag "$TAG" "${{ needs.Preflight.outputs.release_sha }}"
          git push origin "$TAG"

      - name: Prepare Release Notes
        run: |
          set -euo pipefail
          VERSION="${{ needs.Preflight.outputs.version }}"
          node .github/scripts/extract-release-notes.mjs "$VERSION" > notes.md
          echo "----- release notes -----"
          cat notes.md

      - name: Download VSIX Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.Package.outputs.vsix_name }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ needs.Preflight.outputs.tag }}"
          VSIX="${{ needs.Package.outputs.vsix_name }}.vsix"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$VSIX" --clobber
          else
            RELEASE_ARGS=("$TAG" "$VSIX" --title "$TAG" --notes-file notes.md --verify-tag)
            if [ "${{ needs.Preflight.outputs.release_mode }}" = "draft" ]; then
              RELEASE_ARGS+=(--draft)
            fi
            gh release create "${RELEASE_ARGS[@]}"
          fi
