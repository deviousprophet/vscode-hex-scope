name: Publish Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, without v'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name }}-${{ github.ref }}-${{ inputs.version || '' }}
  cancel-in-progress: true

jobs:
  Preflight:
    name: Validate Release Inputs
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      release_sha: ${{ steps.release.outputs.release_sha }}
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Validate Version and Notes
        id: release
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            TAG="v${VERSION}"
            if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
              echo "::error::Release tag ${TAG} already exists."
              exit 1
            fi

            node .github/scripts/prepare-release.mjs "$VERSION"
            if ! git diff --quiet -- CHANGELOG.md; then
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git add CHANGELOG.md
              git commit -m "docs(changelog): release ${VERSION}" -m "[skip ci] Auto-generated by Release workflow."
              git push origin "HEAD:${GITHUB_REF#refs/heads/}"
            fi
          else
            TAG="$GITHUB_REF_NAME"
            VERSION="${TAG#v}"
          fi

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release version must be semver without a leading v; got ${VERSION}"
            exit 1
          fi

          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "$VERSION" != "$PACKAGE_VERSION" ]; then
            echo "::error::Release version ${VERSION} does not match package.json version ${PACKAGE_VERSION}"
            exit 1
          fi

          node .github/scripts/extract-release-notes.mjs "$VERSION" >/tmp/release-notes.md
          RELEASE_SHA="$(git rev-parse HEAD)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "release_sha=$RELEASE_SHA" >> "$GITHUB_OUTPUT"

  Test:
    name: Test Before Release
    needs: Preflight
    uses: ./.github/workflows/ct.yml
    with:
      checkout_ref: ${{ needs.Preflight.outputs.release_sha }}
    permissions:
      contents: read

  Package:
    name: Package VSIX
    needs: Test
    if: ${{ needs.Test.result == 'success' }}
    uses: ./.github/workflows/package.yml
    with:
      use_package_version: true
      checkout_ref: ${{ needs.Preflight.outputs.release_sha }}
    permissions:
      contents: read

  Release:
    name: Publish Release
    needs:
      - Preflight
      - Package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.Preflight.outputs.release_sha }}

      - name: Create Release Tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          set -euo pipefail
          TAG="${{ needs.Preflight.outputs.tag }}"
          git tag "$TAG" "$GITHUB_SHA"
          git push origin "$TAG"

      - name: Prepare Release Notes
        run: |
          set -euo pipefail
          VERSION="${{ needs.Preflight.outputs.version }}"
          node .github/scripts/extract-release-notes.mjs "$VERSION" > notes.md
          echo "----- release notes -----"
          cat notes.md

      - name: Download VSIX Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.Package.outputs.vsix_name }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ needs.Preflight.outputs.tag }}"
          VSIX="${{ needs.Package.outputs.vsix_name }}.vsix"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$VSIX" --clobber
          else
            gh release create "$TAG" "$VSIX" --title "$TAG" --notes-file notes.md --verify-tag
          fi
