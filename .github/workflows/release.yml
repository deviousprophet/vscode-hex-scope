name: Publish Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Test:
    name: Test Before Release
    uses: ./.github/workflows/ct.yml
    permissions:
      contents: read

  Package:
    name: Package VSIX
    needs: Test
    if: ${{ needs.Test.result == 'success' }}
    uses: ./.github/workflows/package.yml
    with:
      use_package_version: true
    permissions:
      contents: read

  Release:
    name: Publish Release
    needs: Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Prepare Release Notes
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "$VERSION" != "$PACKAGE_VERSION" ]; then
            echo "::error::Tag version $VERSION does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi
          node .github/scripts/extract-release-notes.mjs "$VERSION" > notes.md
          echo "----- release notes -----"
          cat notes.md

      - name: Download VSIX Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.Package.outputs.vsix_name }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="$GITHUB_REF_NAME"
          VSIX="${{ needs.Package.outputs.vsix_name }}.vsix"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$VSIX" --clobber
          else
            gh release create "$TAG" "$VSIX" --title "$TAG" --notes-file notes.md
          fi
